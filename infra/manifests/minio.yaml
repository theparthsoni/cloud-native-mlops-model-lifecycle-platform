apiVersion: v1
kind: Secret
metadata:
  name: mlops-minio
  namespace: mlops-platform
type: Opaque
stringData:
  root-user: minio
  root-password: minio12345
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlops-minio
  namespace: mlops-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlops-minio
  template:
    metadata:
      labels:
        app: mlops-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args:
            - server
            - /data
            - --console-address
            - ":9090"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: mlops-minio
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlops-minio
                  key: root-password
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9090
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mlops-minio
  namespace: mlops-platform
spec:
  selector:
    app: mlops-minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: mlops-minio-console
  namespace: mlops-platform
spec:
  selector:
    app: mlops-minio
  ports:
    - name: console
      port: 9090
      targetPort: 9090
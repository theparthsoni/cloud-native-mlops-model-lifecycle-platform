apiVersion: batch/v1
kind: Job
metadata:
  name: minio-seed-job
  namespace: mlops-platform
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed-batch-input
          image: python:3.11-slim
          command:
            - /bin/sh
            - -c
            - |
              pip install --no-cache-dir boto3 pandas scikit-learn && \
              python - <<'PY'
              import boto3
              from botocore.exceptions import ClientError
              from sklearn.datasets import load_breast_cancer

              MINIO_ENDPOINT = "http://mlops-minio.mlops-platform.svc.cluster.local:9000"
              ACCESS_KEY = "minio"
              SECRET_KEY = "minio12345"
              BUCKET = "mlflow"
              OBJECT_KEY = "batch/input/batch_input.csv"

              data = load_breast_cancer(as_frame=True)
              df = data.frame.drop(columns=["target"]).head(20)
              csv_data = df.to_csv(index=False).encode("utf-8")

              s3 = boto3.client(
                  "s3",
                  endpoint_url=MINIO_ENDPOINT,
                  aws_access_key_id=ACCESS_KEY,
                  aws_secret_access_key=SECRET_KEY,
              )

              try:
                  s3.head_bucket(Bucket=BUCKET)
                  print(f"Bucket '{BUCKET}' already exists")
              except ClientError:
                  print(f"Creating bucket '{BUCKET}'")
                  s3.create_bucket(Bucket=BUCKET)

              s3.put_object(Bucket=BUCKET, Key=OBJECT_KEY, Body=csv_data)
              print(f"Uploaded s3://{BUCKET}/{OBJECT_KEY} with {len(df)} rows")
              print("Columns:")
              for col in df.columns:
                  print(f" - {col}")
              PY
airflowVersion: "2.9.3"

images:
  airflow:
    repository: mlops-airflow
    tag: latest
    pullPolicy: IfNotPresent

executor: KubernetesExecutor

env:
  - name: PYTHONPATH
    value: /opt/airflow

config:
  core:
    load_examples: "False"
  webserver:
    expose_config: "True"

createUserJob:
  defaultUser:
    enabled: true
    role: Admin
    username: admin
    password: admin
    email: admin@example.com

webserverSecretKey: "static-airflow-api-secret-key-change-me"

webserver:
  resources:
    requests:
      cpu: 200m
      memory: 512Mi

scheduler:
  resources:
    requests:
      cpu: 200m
      memory: 512Mi

workers:
  resources:
    requests:
      cpu: 200m
      memory: 512Mi

postgresql:
  enabled: true
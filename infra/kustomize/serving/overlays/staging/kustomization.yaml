apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mlops-staging
resources:
  - ../../base
patches:
  - target:
      kind: Deployment
      name: model-serving
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/2/value
        value: Staging
      - op: replace
        path: /spec/template/spec/containers/0/env/3/value
        value: staging-key

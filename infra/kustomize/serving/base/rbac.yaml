apiVersion: v1
kind: ServiceAccount
metadata:
  name: model-serving
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: model-serving-read
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: model-serving-read
subjects:
  - kind: ServiceAccount
    name: model-serving
roleRef:
  kind: Role
  name: model-serving-read
  apiGroup: rbac.authorization.k8s.io
